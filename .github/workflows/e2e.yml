name: E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-docker:
    name: E2E (preset=recommended, Qdrant Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-mem0
        run: pip install -e .

      - name: Install and configure (recommended preset, override to small model)
        run: agent-mem0 install --preset recommended --llm-model qwen2.5:0.5b

      - name: Run E2E test
        run: python tests/e2e_test.py

      - name: Test CLI - status
        run: agent-mem0 status

      - name: Test CLI - setup
        run: |
          mkdir -p /tmp/test-project && cd /tmp/test-project
          agent-mem0 setup --name test-project

      - name: Test CLI - uninstall
        run: agent-mem0 uninstall --force

  e2e-local:
    name: E2E (preset=light, Qdrant Local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-mem0
        run: pip install -e .

      - name: Install and configure (light preset)
        run: agent-mem0 install --preset light

      - name: Run E2E test
        run: python tests/e2e_test.py

      - name: Test CLI - status
        run: agent-mem0 status

      - name: Test CLI - setup
        run: |
          mkdir -p /tmp/test-project && cd /tmp/test-project
          agent-mem0 setup --name test-project

      - name: Test CLI - uninstall
        run: agent-mem0 uninstall --force
